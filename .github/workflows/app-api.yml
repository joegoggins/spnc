name: app-api image

# Monorepo-scoped: only runs when the app-api service (or this workflow) changes.
# PRs run the checks job; main also builds/pushes the image after checks pass.
on:
  push:
    branches: [main]
    paths:
      - 'projects/collabornet/services/app-api/**'
      - '.github/workflows/app-api.yml'
  pull_request:
    paths:
      - 'projects/collabornet/services/app-api/**'
      - '.github/workflows/app-api.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional pinned image tag to cut (e.g. 0.1.1). sha-<sha> and latest are always pushed too.'
        required: false
        default: ''

concurrency:
  group: app-api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # lets GITHUB_TOKEN push to GHCR — no PAT needed

env:
  IMAGE: ghcr.io/joegoggins/collabornet-app-api
  CONTEXT: projects/collabornet/services/app-api

jobs:
  # Lint + tests, same as `make lint` / `make test`. Runs on PRs and on main.
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/collabornet
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Lint (ruff)
        run: make lint
      - name: Test (pytest)
        run: make test

  # Build/push only after checks pass, and never on pull_request (no GHCR push
  # from PRs — those run checks only).
  build-push:
    needs: checks
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU emulates the non-native arch for the arm64/amd64 wheel install;
      # the app is pure Python so its deps install from prebuilt wheels.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=deploy-${{ github.ref_name }},enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
