name: mspsolarpunk web image

# Monorepo-scoped: only builds when the site (or this workflow) changes.
on:
  push:
    branches: [main]
    paths:
      - 'projects/mspsolarpunk/services/web/**'
      - '.github/workflows/mspsolarpunk-web.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional pinned image tag to cut (e.g. 0.1.1). sha-<sha> and latest are always pushed too.'
        required: false
        default: ''

concurrency:
  group: mspsolarpunk-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # lets GITHUB_TOKEN push to GHCR — no PAT needed

env:
  IMAGE: ghcr.io/joegoggins/mspsolarpunk-web
  CONTEXT: projects/mspsolarpunk/services/web

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=deploy-${{ github.ref_name }},enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
