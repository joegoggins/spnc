apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.credentialsSecretName }}
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  # cloudflared tunnel credentials (AccountTag/TunnelID/TunnelSecret). Supplied
  # SOPS-encrypted via the helmfile env secret; rendered here into the Secret
  # that the Deployment mounts at /etc/cloudflared/creds/credentials.json.
  credentials.json: {{ .Values.credentialsJson | quote }}
