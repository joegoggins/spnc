<!--
  Placeholder hero art (hand-coded SVG, not an actual AI image generator —
  none is wired up in this environment). Swap this file for a real
  AI-generated image later; same symbols requested: loon, solar panels,
  sunshine, plants.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3a4b"/>
      <stop offset="45%" stop-color="#3d6b73"/>
      <stop offset="72%" stop-color="#e08a3e"/>
      <stop offset="100%" stop-color="#f4c150"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6d8"/>
      <stop offset="55%" stop-color="#ffd766"/>
      <stop offset="100%" stop-color="#ffb703" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4c150"/>
      <stop offset="15%" stop-color="#3d7a75"/>
      <stop offset="100%" stop-color="#123c3e"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6b4a"/>
      <stop offset="100%" stop-color="#1e3f2a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#274472"/>
      <stop offset="100%" stop-color="#12213b"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- sun + rays, low on the horizon -->
  <circle cx="1180" cy="430" r="240" fill="url(#sun)"/>
  <g stroke="#ffe9a8" stroke-width="4" opacity="0.55">
    <line x1="1180" y1="150" x2="1180" y2="90"/>
    <line x1="1370" y1="230" x2="1420" y2="190"/>
    <line x1="1440" y1="400" x2="1500" y2="390"/>
    <line x1="990" y1="230" x2="940" y2="190"/>
    <line x1="920" y1="400" x2="860" y2="390"/>
  </g>
  <circle cx="1180" cy="430" r="110" fill="#ffe9a8"/>

  <!-- water + horizon line -->
  <rect x="0" y="470" width="1600" height="430" fill="url(#water)"/>
  <g stroke="#fbe3a3" stroke-width="3" opacity="0.35">
    <line x1="0" y1="470" x2="1600" y2="470"/>
  </g>

  <!-- rolling hill carrying the solar array, stage-left -->
  <path d="M0,560 C220,480 380,470 560,510 C680,535 760,560 900,560 L900,900 L0,900 Z" fill="url(#hill)"/>

  <!-- solar panel array on the hill -->
  <g transform="translate(120,380) rotate(-6)">
    <g>
      <rect x="0"   y="0" width="150" height="90" rx="4" fill="url(#panel)"/>
      <rect x="170" y="20" width="150" height="90" rx="4" fill="url(#panel)"/>
      <rect x="340" y="45" width="150" height="90" rx="4" fill="url(#panel)"/>
      <g stroke="#6f93c9" stroke-width="2" opacity="0.6">
        <line x1="0" y1="30" x2="150" y2="30"/>
        <line x1="0" y1="60" x2="150" y2="60"/>
        <line x1="50" y1="0" x2="50" y2="90"/>
        <line x1="100" y1="0" x2="100" y2="90"/>
        <line x1="170" y1="50" x2="320" y2="50"/>
        <line x1="170" y1="80" x2="320" y2="80"/>
        <line x1="220" y1="20" x2="220" y2="110"/>
        <line x1="270" y1="20" x2="270" y2="110"/>
        <line x1="340" y1="75" x2="490" y2="75"/>
        <line x1="340" y1="105" x2="490" y2="105"/>
        <line x1="390" y1="45" x2="390" y2="135"/>
        <line x1="440" y1="45" x2="440" y2="135"/>
      </g>
    </g>
  </g>

  <!-- loon, floating on open water clear of the text card -->
  <g transform="translate(1230,700)">
    <ellipse cx="0" cy="70" rx="90" ry="14" fill="#0b2b2c" opacity="0.35"/>
    <path d="M-70,10 C-70,-25 -35,-45 5,-45 C45,-45 78,-25 85,5 C90,25 70,35 40,32 C10,29 -40,35 -70,10 Z" fill="#0e1a1a"/>
    <path d="M-40,-10 C-20,-18 10,-18 30,-8" stroke="#f5f3e7" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M-10,-30 C10,-38 32,-32 42,-14" stroke="#0e1a1a" stroke-width="18" fill="none" stroke-linecap="round"/>
    <circle cx="46" cy="-24" r="15" fill="#0e1a1a"/>
    <circle cx="51" cy="-27" r="2.6" fill="#c0392b"/>
    <path d="M60,-30 L78,-27 L60,-22 Z" fill="#f2e9d8"/>
  </g>

  <!-- foreground plants, both bottom corners -->
  <g fill="#1f4a2c">
    <path d="M0,900 C10,760 60,690 140,660 C90,720 70,800 80,900 Z"/>
    <path d="M40,900 C70,780 140,730 220,720 C160,770 120,830 130,900 Z"/>
    <path d="M0,900 C40,820 40,760 10,700 C-10,780 -10,850 0,900 Z"/>
  </g>
  <g fill="#2f6b3c">
    <path d="M1600,900 C1580,780 1500,720 1420,700 C1490,750 1520,820 1500,900 Z"/>
    <path d="M1560,900 C1520,800 1440,760 1360,760 C1440,790 1490,840 1490,900 Z"/>
  </g>
</svg>
