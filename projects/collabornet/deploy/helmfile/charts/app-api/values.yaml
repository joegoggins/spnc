# Defaults; real values come from charts/app-api/values.yaml.gotmpl (helmfile).
replicaCount: 1

image:
  repository: ghcr.io/joegoggins/collabornet-app-api
  tag: "0.1.0"
  # Always: sp-staging pins to the moving `deploy-main` tag, so a freshly
  # scheduled/restarted pod must re-check the registry to get the current image.
  pullPolicy: Always

resources: {}

# Populated from globals (helmfile) for private GHCR pulls.
imagePullSecrets: []
