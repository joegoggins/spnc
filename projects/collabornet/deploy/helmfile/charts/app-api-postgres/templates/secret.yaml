apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.secretName }}
  labels:
    app: {{ .Release.Name }}
type: Opaque
# Consumed by the postgres container (envFrom) AND by app-api (POSTGRES_PASSWORD
# secretKeyRef) — one source of truth for the credential in this namespace.
stringData:
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.password | quote }}
