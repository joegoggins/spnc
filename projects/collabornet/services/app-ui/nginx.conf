server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed filenames under /assets, so cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing: unknown paths (e.g. /radius) fall back to the
    # app shell so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # TODO(app-api increment): proxy /api/ -> app-api service. Deferred because
    # proxy_pass to an unresolvable upstream fails nginx startup, and app-api
    # isn't deployed yet. Dev uses Vite's server.proxy instead (vite.config.ts).
}
