[tool.uv.workspace]
members = [
    "services/app-api",
]

[dependency-groups]
dev = [
    "ruff>=0.7.0",
    "pyright>=1.1.380",
    "pytest>=8.0",
    "httpx>=0.27",
    "moto>=5.2.1",
]

[tool.pytest.ini_options]
testpaths = ["services/app-api"]
python_files = ["test_*.py"]
addopts = "--import-mode=importlib"

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "services/app-api/alembic/versions",
    "experiments",
    ".venv",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I"]

[tool.ruff.format]
quote-style = "double"
